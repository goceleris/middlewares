version: "2"
run:
  timeout: 5m
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/goceleris/middlewares
linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - ineffassign
    - unused
    - misspell
    - unconvert
    - unparam
    - prealloc
    - nolintlint
  settings:
    nolintlint:
      require-explanation: true
      require-specific: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - unparam
      - path: _test\.go
        linters:
          - revive
        text: "dot-imports"
