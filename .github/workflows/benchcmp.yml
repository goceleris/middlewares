name: Benchmark Comparison
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Run cross-framework benchmarks
        working-directory: test/benchcmp
        run: go test -bench=. -benchmem -count=5 -run=^$ -timeout=600s ./... | tee results.txt
      - uses: actions/upload-artifact@v4
        with:
          name: benchcmp-results
          path: test/benchcmp/results.txt
