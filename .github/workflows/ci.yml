name: CI
on:
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9

  lint-submodules:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [metrics, otel]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          working-directory: ${{ matrix.module }}

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: filter
        run: |
          # When called via workflow_call (e.g., release), test all packages.
          if [ -z "${{ github.event.pull_request.number }}" ]; then
            echo "packages=./..." >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only origin/main...HEAD | grep '\.go$' | xargs -I{} dirname {} | sort -u)
          # Filter out sub-module directories (tested separately)
          ROOT_CHANGED=$(echo "$CHANGED" | grep -Ev '^(metrics|otel)(/|$)')
          if echo "$ROOT_CHANGED" | grep -qE '^(internal/|go\.mod|go\.sum)'; then
            echo "packages=./..." >> "$GITHUB_OUTPUT"
          else
            PKGS=$(echo "$ROOT_CHANGED" | grep -v '^internal/' | grep -v '^\.' | grep -v '^test/' | sed 's|$|/...|' | sed 's|^|./|' | paste -sd' ' -)
            if [ -z "$PKGS" ]; then
              echo "packages=" >> "$GITHUB_OUTPUT"
            else
              echo "packages=$PKGS" >> "$GITHUB_OUTPUT"
            fi
          fi

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.packages != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Test (root module only, sub-modules tested separately)
        run: |
          PKGS="${{ needs.detect-changes.outputs.packages }}"
          if [ "$PKGS" = "./..." ]; then
            PKGS=$(go list ./... | paste -sd' ' -)
          fi
          go test -race -count=1 -timeout=120s $PKGS

  bench:
    needs: detect-changes
    if: needs.detect-changes.outputs.packages != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Run benchmarks (affected packages)
        run: |
          PKGS="${{ needs.detect-changes.outputs.packages }}"
          if [ "$PKGS" = "./..." ]; then
            PKGS=$(go list ./... | paste -sd' ' -)
          fi
          go test -bench=. -benchmem -count=5 -run=^$ -timeout=300s $PKGS | tee bench-current.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bench-pr
          path: bench-current.txt

  test-submodules:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [metrics, otel]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Test ${{ matrix.module }}
        run: cd ${{ matrix.module }} && go test -race -count=1 -timeout=120s ./...
      - name: Bench ${{ matrix.module }}
        run: cd ${{ matrix.module }} && go test -bench=. -benchmem -count=5 -run=^$ -timeout=300s ./... | tee bench-${{ matrix.module }}.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.module }}
          path: ${{ matrix.module }}/bench-${{ matrix.module }}.txt
